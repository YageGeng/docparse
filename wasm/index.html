<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docparse Layout WASM</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #eef3f2;
        color: #14201d;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 650;
      }

      .status {
        font-size: 13px;
        color: #48615a;
      }

      .grid {
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        border: 1px solid #c6d3cf;
        border-radius: 6px;
        background: #ffffff;
      }

      .controls {
        padding: 16px;
      }

      label {
        display: block;
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 600;
      }

      input[type="file"] {
        display: block;
        box-sizing: border-box;
        width: 100%;
        min-height: 36px;
        margin-top: 6px;
        font: inherit;
        color: inherit;
      }

      button {
        width: 100%;
        min-height: 40px;
        margin-top: 4px;
        border: 1px solid #1d5f53;
        border-radius: 6px;
        background: #1f6f60;
        color: #ffffff;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        border-color: #9baaa6;
        background: #9baaa6;
      }

      .preview {
        display: grid;
        grid-template-rows: minmax(260px, 52vh) minmax(180px, 1fr);
        gap: 16px;
      }

      .image-box {
        display: grid;
        place-items: center;
        overflow: auto;
      }

      img {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }

      pre {
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        min-height: 180px;
        margin: 0;
        padding: 14px;
        overflow: auto;
        border: 0;
        border-top: 1px solid #d6e0dd;
        background: #fbfdfc;
        line-height: 1.5;
      }

      .error {
        color: #9f1d20;
      }

      @media (max-width: 820px) {
        header,
        .grid {
          display: block;
        }

        .controls {
          margin-bottom: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Docparse Layout WASM</h1>
        <div class="status" id="status">Loading module...</div>
      </header>

      <div class="grid">
        <section class="panel controls">
          <label>
            image
            <input id="image" type="file" accept="image/png,image/jpeg,image/webp" />
          </label>
          <button id="run" disabled>Run inference</button>
        </section>

        <section class="preview">
          <div class="panel image-box">
            <img id="preview" alt="" />
          </div>
          <div class="panel">
            <pre id="output">Waiting for image.</pre>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import init, {
        backend,
        create_layout_session,
        smoke_test,
        version,
      } from "./pkg/docparse_wasm.js";

      const status = document.querySelector("#status");
      const output = document.querySelector("#output");
      const run = document.querySelector("#run");
      const preview = document.querySelector("#preview");
      const fields = {
        image: document.querySelector("#image"),
      };

      let session = null;
      let loaded = false;
      const modelFiles = {
        config: "./models/pp-doclayout-v3/config.json",
        preprocessor: "./models/pp-doclayout-v3/preprocessor_config.json",
        weights: "./models/pp-doclayout-v3/model.safetensors",
      };

      function fileOf(input) {
        return input.files && input.files.length > 0 ? input.files[0] : null;
      }

      function readyToRun() {
        return fileOf(fields.image);
      }

      async function readBytes(file) {
        return new Uint8Array(await file.arrayBuffer());
      }

      async function fetchModelFile(name, url) {
        status.textContent = `Loading ${name}...`;
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(
            `${name} missing: ${response.status}. Run: uv run scripts/download_pp_doclayout_model.py`,
          );
        }
        return new Uint8Array(await response.arrayBuffer());
      }

      function setOutput(value, isError = false) {
        output.classList.toggle("error", isError);
        output.textContent = value;
      }

      function updateRunState() {
        run.disabled = !loaded || !readyToRun();
      }

      Object.values(fields).forEach((input) => {
        input.addEventListener("change", () => {
          if (input === fields.image) {
            const image = fileOf(fields.image);
            preview.src = image ? URL.createObjectURL(image) : "";
          }
          updateRunState();
        });
      });

      run.addEventListener("click", async () => {
        run.disabled = true;
        const started = performance.now();
        try {
          status.textContent = "Loading model...";
          if (!session) {
            const model = {
              config: await fetchModelFile("config.json", modelFiles.config),
              preprocessor: await fetchModelFile(
                "preprocessor_config.json",
                modelFiles.preprocessor,
              ),
              weights: await fetchModelFile("model.safetensors", modelFiles.weights),
            };
            session = await create_layout_session(
              model.config,
              model.preprocessor,
              model.weights,
            );
          }

          status.textContent = "Running inference...";
          const result = await session.detect(await readBytes(fileOf(fields.image)));
          const elapsed = performance.now() - started;
          status.textContent = `Done in ${elapsed.toFixed(1)} ms`;
          setOutput(result);
        } catch (error) {
          status.textContent = "Failed";
          setOutput(error instanceof Error ? error.stack : String(error), true);
        } finally {
          updateRunState();
        }
      });

      try {
        await init();
        JSON.parse(smoke_test());
        loaded = true;
        status.textContent = `${version()} / ${backend()}`;
        updateRunState();
      } catch (error) {
        status.textContent = "Failed";
        setOutput(error instanceof Error ? error.stack : String(error), true);
      }
    </script>
  </body>
</html>
