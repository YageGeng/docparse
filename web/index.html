<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Docparse WASM Layout Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #20242c;
      }

      body {
        margin: 0;
      }

      main {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 26px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .panel {
        border: 1px solid #d8dde6;
        border-radius: 8px;
        background: #fff;
        padding: 18px;
        margin-bottom: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        align-items: end;
      }

      .pdf-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 120px 120px 120px 120px 120px 120px auto;
        gap: 12px;
        align-items: end;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: #4b5565;
        font-size: 13px;
        font-weight: 600;
      }

      input {
        box-sizing: border-box;
        width: 100%;
        min-height: 40px;
        border: 1px solid #c9d0db;
        border-radius: 6px;
        padding: 8px 10px;
        font: inherit;
        background: #fff;
      }

      input[type="file"] {
        padding: 6px 10px;
      }

      button {
        min-height: 40px;
        border: 0;
        border-radius: 6px;
        padding: 0 16px;
        font: inherit;
        font-weight: 650;
        background: #2457d6;
        color: #fff;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        background: #9aa6ba;
      }

      .status {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border: 1px solid #e2e6ee;
        border-radius: 6px;
        padding: 12px;
        background: #fbfcfe;
      }

      .metric strong {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        color: #657084;
      }

      .metric span {
        font-size: 14px;
        font-weight: 650;
      }

      .progress-panel {
        display: grid;
        gap: 8px;
      }

      .progress-summary {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: #4b5565;
        font-size: 13px;
        font-weight: 600;
      }

      .progress-track {
        overflow: hidden;
        height: 10px;
        border-radius: 999px;
        background: #e8ecf3;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: #2457d6;
        transition: width 160ms ease;
      }

      pre {
        min-height: 220px;
        overflow: auto;
        margin: 0;
        border-radius: 6px;
        background: #111827;
        color: #d6e2ff;
        padding: 14px;
        font-size: 13px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .preview {
        display: grid;
        /* Detection pages are the main output, so keep them large and stacked for review. */
        grid-template-columns: minmax(0, 1fr);
        gap: 18px;
      }

      .page {
        position: relative;
        border: 1px solid #d8dde6;
        border-radius: 6px;
        padding: 12px;
        background: #fff;
      }

      .page img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #e2e6ee;
        background: #fff;
      }

      .page figcaption {
        margin-top: 8px;
        font-size: 12px;
        color: #4b5565;
      }

      .page-canvas {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid #e2e6ee;
        background: #fff;
      }

      .page-preview-button {
        display: block;
        width: 100%;
        min-height: 0;
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: inherit;
        cursor: pointer;
      }

      .page-preview-button:focus-visible {
        outline: 3px solid #2457d6;
        outline-offset: 3px;
      }

      .layout-json {
        display: none;
        min-height: 0;
        max-height: 320px;
        margin-top: 8px;
      }

      .page.is-json-visible .layout-json {
        display: block;
      }

      .json-actions {
        display: none;
        justify-content: flex-end;
        margin-top: 10px;
      }

      .page.is-json-visible .json-actions {
        display: flex;
      }

      .copy-json-button {
        min-height: 32px;
        border: 1px solid #c9d0db;
        border-radius: 6px;
        padding: 0 10px;
        background: #fff;
        color: #20242c;
        font-size: 12px;
      }

      @media (max-width: 720px) {
        .grid,
        .pdf-grid,
        .status {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Docparse WASM Layout Test</h1>

      <section class="panel">
        <div class="grid">
          <div>
            <label for="model-url">Model URL</label>
            <input
              id="model-url"
              value="../models/pp-structure-v3-onnx/inference.onnx"
              autocomplete="off"
            />
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="pdf-grid">
          <div>
            <label for="source-file">Input File</label>
            <input
              id="source-file"
              type="file"
              accept="application/pdf,image/png,image/jpeg,image/webp,.pdf,.png,.jpg,.jpeg,.webp"
            />
          </div>
          <div>
            <label for="max-pages">Max Pages</label>
            <input id="max-pages" type="number" min="1" value="1024" />
          </div>
          <div>
            <label for="pdf-dpi">DPI</label>
            <input id="pdf-dpi" type="number" min="1" value="144" />
          </div>
          <div>
            <label for="batch-size">Batch Size</label>
            <input id="batch-size" type="number" min="1" max="32" value="4" />
          </div>
          <div>
            <label for="threshold">Threshold</label>
            <input
              id="threshold"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.2"
            />
          </div>
          <div>
            <label for="nms-threshold">NMS</label>
            <input
              id="nms-threshold"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
            />
          </div>
          <div>
            <label for="cross-label-threshold">Cross Label</label>
            <input
              id="cross-label-threshold"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.9"
            />
          </div>
          <button id="detect-button" type="button">Run Detection</button>
        </div>
      </section>

      <section class="panel status" aria-live="polite">
        <div class="metric">
          <strong>WebGPU</strong>
          <span id="webgpu-status">checking</span>
        </div>
        <div class="metric">
          <strong>WASM</strong>
          <span id="wasm-status">idle</span>
        </div>
        <div class="metric">
          <strong>Analyzer</strong>
          <span id="analyzer-status">idle</span>
        </div>
      </section>

      <section class="panel progress-panel" aria-live="polite">
        <div class="progress-summary">
          <span id="progress-text">Progress 0 / 0</span>
          <span id="elapsed-text">Elapsed 0.0s</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
      </section>

      <section class="panel">
        <div id="preview" class="preview"></div>
      </section>
    </main>

    <script type="module">
      import init, {
        WasmLayoutAnalyzer,
        layout_label_color,
        render_pdf_to_png_pages,
      } from "./pkg/docparse_web.js";

      const modelUrlEl = document.querySelector("#model-url");
      const sourceFileEl = document.querySelector("#source-file");
      const maxPagesEl = document.querySelector("#max-pages");
      const pdfDpiEl = document.querySelector("#pdf-dpi");
      const batchSizeEl = document.querySelector("#batch-size");
      const thresholdEl = document.querySelector("#threshold");
      const nmsThresholdEl = document.querySelector("#nms-threshold");
      const crossLabelThresholdEl = document.querySelector("#cross-label-threshold");
      const detectButton = document.querySelector("#detect-button");
      const previewEl = document.querySelector("#preview");
      const webgpuStatus = document.querySelector("#webgpu-status");
      const wasmStatus = document.querySelector("#wasm-status");
      const analyzerStatus = document.querySelector("#analyzer-status");
      const progressText = document.querySelector("#progress-text");
      const elapsedText = document.querySelector("#elapsed-text");
      const progressTrack = document.querySelector(".progress-track");
      const progressBar = document.querySelector("#progress-bar");

      let wasmReady = false;
      let analyzer = null;
      let analyzerModelUrl = null;
      let previewPages = [];

      function log(message, data) {
        // Keep diagnostics in devtools because the HTML view is reserved for visual results.
        if (data === undefined) {
          console.info(`[docparse] ${message}`);
        } else {
          console.info(`[docparse] ${message}`, data);
        }
      }

      async function ensureWasmReady() {
        if (wasmReady) {
          return;
        }
        wasmStatus.textContent = "loading";
        log("loading wasm package from ./pkg/docparse_web.js");
        await init();
        wasmReady = true;
        wasmStatus.textContent = "loaded";
        log("wasm package loaded");
      }

      async function ensureAnalyzerReady() {
        await ensureWasmReady();
        const modelUrl = modelUrlEl.value.trim();
        if (analyzer && analyzerModelUrl === modelUrl) {
          return analyzer;
        }

        analyzerStatus.textContent = "loading";
        log("loading ORT Web analyzer", { modelUrl, ep: "webgpu" });
        const startedAt = performance.now();
        analyzer = await WasmLayoutAnalyzer.create_webgpu(modelUrl);
        analyzerModelUrl = modelUrl;
        analyzerStatus.textContent = "ready";
        log("analyzer ready", {
          modelUrl: analyzer.model_url,
          elapsedMs: Math.round(performance.now() - startedAt),
        });
        return analyzer;
      }

      function setBusy(isBusy) {
        detectButton.disabled = isBusy;
      }

      function formatElapsedMs(elapsedMs) {
        // Keep elapsed time compact because it is shown in the always-visible status area.
        return `${(elapsedMs / 1000).toFixed(1)}s`;
      }

      function updateProgress(donePages, totalPages, startedAt) {
        // Update both text and aria state so long PDF runs expose progress visually and semantically.
        const safeTotal = Math.max(0, totalPages);
        const safeDone = Math.min(Math.max(0, donePages), safeTotal);
        const percent = safeTotal === 0 ? 0 : Math.round((safeDone / safeTotal) * 100);
        progressText.textContent = `Progress ${safeDone} / ${safeTotal}`;
        elapsedText.textContent = `Elapsed ${formatElapsedMs(performance.now() - startedAt)}`;
        progressBar.style.width = `${percent}%`;
        progressTrack.setAttribute("aria-valuenow", String(percent));
      }

      function resetProgress() {
        // Reset stale timing and progress when the input changes or a new run starts.
        progressText.textContent = "Progress 0 / 0";
        elapsedText.textContent = "Elapsed 0.0s";
        progressBar.style.width = "0%";
        progressTrack.setAttribute("aria-valuenow", "0");
      }

      function isPdfFile(file) {
        return file.type === "application/pdf" || file.name.toLowerCase().endsWith(".pdf");
      }

      function isImageFile(file) {
        return file.type.startsWith("image/") || /\.(png|jpe?g|webp)$/i.test(file.name);
      }

      function readThreshold() {
        // Validate here before inference so bad UI input fails fast with a clear message.
        const threshold = Number.parseFloat(thresholdEl.value);
        if (!Number.isFinite(threshold) || threshold < 0 || threshold > 1) {
          throw new Error("threshold must be between 0 and 1");
        }
        return threshold;
      }

      function readBatchSize() {
        // Batch size is intentionally separate from max pages to keep browser memory bounded.
        const batchSize = Number.parseInt(batchSizeEl.value, 10);
        if (!Number.isFinite(batchSize) || batchSize < 1 || batchSize > 32) {
          throw new Error("batch size must be between 1 and 32");
        }
        return batchSize;
      }

      function readNmsThreshold() {
        // NMS is a postprocess setting, so validate it alongside the confidence threshold.
        const threshold = Number.parseFloat(nmsThresholdEl.value);
        if (!Number.isFinite(threshold) || threshold < 0 || threshold > 1) {
          throw new Error("NMS threshold must be between 0 and 1");
        }
        return threshold;
      }

      function readCrossLabelThreshold() {
        // This controls when different labels are treated as the same layout box.
        const threshold = Number.parseFloat(crossLabelThresholdEl.value);
        if (!Number.isFinite(threshold) || threshold < 0 || threshold > 1) {
          throw new Error("cross label threshold must be between 0 and 1");
        }
        return threshold;
      }

      function normalizedReadingOrderMap(blocks) {
        // Normalize sparse model reading-order values into compact display ranks from 0.
        const orders = Array.from(
          new Set(
            (blocks ?? [])
              .map((block) => block.order)
              .filter((order) => Number.isFinite(order)),
          ),
        ).sort((left, right) => left - right);
        return new Map(orders.map((order, index) => [order, index]));
      }

      function detectionCanvasLabel(block, readingOrderMap) {
        // Draw the normalized reading order before the semantic label when available.
        const normalizedOrder = Number.isFinite(block.order)
          ? readingOrderMap.get(block.order)
          : undefined;
        const orderPrefix =
          normalizedOrder === undefined ? "" : `${normalizedOrder} · `;
        return `${orderPrefix}${block.label} ${block.score.toFixed(3)}`;
      }

      function drawDetectionCanvas(page, result) {
        const canvas = document.createElement("canvas");
        canvas.className = "page-canvas";
        canvas.width = page.width;
        canvas.height = page.height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(page.image, 0, 0, page.width, page.height);
        ctx.lineWidth = Math.max(2, Math.round(page.width / 500));
        ctx.font = `${Math.max(12, Math.round(page.width / 60))}px system-ui`;
        ctx.textBaseline = "top";
        const readingOrderMap = normalizedReadingOrderMap(result.blocks);

        for (const block of result.blocks ?? []) {
          const { x, y, width, height } = block.bbox;
          const color = layout_label_color(block.label);
          ctx.strokeStyle = color;
          ctx.fillStyle = color;
          // Use the Rust label color for both fill and stroke so every label is visually distinct.
          ctx.globalAlpha = 0.12;
          ctx.fillRect(x, y, width, height);
          ctx.globalAlpha = 1;
          ctx.strokeRect(x, y, width, height);
          const label = detectionCanvasLabel(block, readingOrderMap);
          const labelWidth = ctx.measureText(label).width + 8;
          const labelHeight = Math.max(18, Math.round(page.width / 45));
          ctx.fillStyle = color;
          ctx.fillRect(x, Math.max(0, y - labelHeight), labelWidth, labelHeight);
          ctx.fillStyle = "#fff";
          ctx.fillText(label, x + 4, Math.max(0, y - labelHeight) + 2);
        }

        return canvas;
      }

      function createDetectionFigure(page, result) {
        // The canvas is wrapped in a button so clicking the drawn page toggles its parsed JSON.
        const figure = document.createElement("figure");
        figure.className = "page";

        const previewButton = document.createElement("button");
        previewButton.className = "page-preview-button";
        previewButton.type = "button";
        previewButton.title = "Show layout JSON";
        previewButton.append(drawDetectionCanvas(page, result));

        const caption = document.createElement("figcaption");
        caption.textContent = `${page.source} · ${result.blocks.length} blocks`;

        const jsonActions = document.createElement("div");
        jsonActions.className = "json-actions";
        const copyButton = document.createElement("button");
        copyButton.className = "copy-json-button";
        copyButton.type = "button";
        copyButton.textContent = "Copy JSON";

        const json = document.createElement("pre");
        json.className = "layout-json";
        json.textContent = "";

        let prettyJson = null;
        const getPrettyJson = () => {
          // Defer pretty formatting until the JSON panel is used; large PDFs can have many pages.
          prettyJson ??= JSON.stringify(result, null, 2);
          return prettyJson;
        };

        previewButton.addEventListener("click", () => {
          const isVisible = figure.classList.toggle("is-json-visible");
          previewButton.title = isVisible ? "Hide layout JSON" : "Show layout JSON";
          if (isVisible && !json.textContent) {
            json.textContent = getPrettyJson();
          }
        });

        copyButton.addEventListener("click", async () => {
          await navigator.clipboard.writeText(getPrettyJson());
          copyButton.textContent = "Copied";
          window.setTimeout(() => {
            copyButton.textContent = "Copy JSON";
          }, 1200);
        });

        jsonActions.append(copyButton);
        figure.append(previewButton, caption, jsonActions, json);
        return figure;
      }

      async function imageElementFromBytes(bytes, mimeType) {
        const blob = new Blob([bytes], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.src = url;
        await img.decode();
        return { img, url };
      }

      async function loadImageDetectionPage(file) {
        // Only prepare image bytes for detection; raw input previews are intentionally not rendered.
        const bytes = new Uint8Array(await file.arrayBuffer());
        const { img, url } = await imageElementFromBytes(bytes, file.type || "image/png");
        previewPages = [
          {
            pageIndex: 0,
            width: img.naturalWidth,
            height: img.naturalHeight,
            bytes,
            image: img,
            objectUrl: url,
            source: file.name,
          },
        ];
        log("image preview loaded", {
          name: file.name,
          bytes: bytes.byteLength,
          width: img.naturalWidth,
          height: img.naturalHeight,
        });
      }

      async function loadPdfDetectionPages(file) {
        // Render PDF pages only as analyzer inputs; the UI shows detection canvases after inference.
        await ensureWasmReady();
        previewPages = [];

        const maxPages = Number.parseInt(maxPagesEl.value, 10);
        const dpi = Number.parseFloat(pdfDpiEl.value);
        const bytes = new Uint8Array(await file.arrayBuffer());
        log("rendering PDF before layout detection", {
          name: file.name,
          bytes: bytes.byteLength,
          maxPages,
          dpi,
        });

        const pages = render_pdf_to_png_pages(bytes, maxPages, dpi);
        for (const page of pages) {
          const png = page.png_data;
          const { img, url } = await imageElementFromBytes(png, "image/png");
          previewPages.push({
            pageIndex: page.page_index,
            width: page.width,
            height: page.height,
            bytes: png,
            image: img,
            objectUrl: url,
            source: `${file.name}#page=${page.page_index + 1}`,
          });
        }
        log("PDF render complete", { pages: pages.length });
      }

      if ("gpu" in navigator) {
        webgpuStatus.textContent = "available";
        log("navigator.gpu is available");
      } else {
        webgpuStatus.textContent = "missing";
        log("navigator.gpu is not available");
      }

      sourceFileEl.addEventListener("change", async () => {
        setBusy(true);
        try {
          const file = sourceFileEl.files?.[0];
          previewPages = [];
          previewEl.replaceChildren();
          resetProgress();
          if (!file) {
            return;
          }

          if (isImageFile(file)) {
            log("image selected; it will render after detection", {
              name: file.name,
              bytes: file.size,
            });
          } else if (isPdfFile(file)) {
            log("PDF selected; it will render when detection starts", {
              name: file.name,
              maxPages: Number.parseInt(maxPagesEl.value, 10),
              dpi: Number.parseFloat(pdfDpiEl.value),
            });
          } else {
            throw new Error("choose a PDF, PNG, JPEG, or WebP file");
          }
        } catch (error) {
          log("file selection failed", {
            message: error?.message ?? String(error),
            stack: error?.stack ?? null,
          });
        } finally {
          setBusy(false);
        }
      });

      detectButton.addEventListener("click", async () => {
        setBusy(true);
        try {
          const file = sourceFileEl.files?.[0];
          if (!file) {
            throw new Error("choose an image or PDF first");
          }

          if (isImageFile(file)) {
            await loadImageDetectionPage(file);
          } else if (isPdfFile(file)) {
            await loadPdfDetectionPages(file);
          } else {
            throw new Error("choose a PDF, PNG, JPEG, or WebP file");
          }

          const activeAnalyzer = await ensureAnalyzerReady();
          const threshold = readThreshold();
          const nmsThreshold = readNmsThreshold();
          const crossLabelThreshold = readCrossLabelThreshold();
          const batchSize = readBatchSize();
          const results = [];
          const startedAt = performance.now();
          updateProgress(0, previewPages.length, startedAt);
          log("running layout detection", {
            pages: previewPages.length,
            batchSize,
            threshold,
            nmsThreshold,
            crossLabelThreshold,
          });

          previewEl.replaceChildren();
          let completedPages = 0;
          for (let offset = 0; offset < previewPages.length; offset += batchSize) {
            const pageBatch = previewPages.slice(offset, offset + batchSize);
            const batchStartedAt = performance.now();
            const imageBytesBatch = pageBatch.map((page) => page.bytes);
            const resultJson =
              await activeAnalyzer.analyze_image_bytes_batch_with_options(
                imageBytesBatch,
                threshold,
                nmsThreshold,
                crossLabelThreshold,
              );
            const batchResults = JSON.parse(resultJson);
            if (batchResults.length !== pageBatch.length) {
              throw new Error("batched analyzer returned a different page count");
            }

            for (const [index, result] of batchResults.entries()) {
              const page = pageBatch[index];
              results.push({
                pageIndex: page.pageIndex,
                source: page.source,
                result,
                elapsedMs: Math.round(performance.now() - batchStartedAt),
              });

              previewEl.append(createDetectionFigure(page, result));
            }
            // Progress is updated after each batch because this is the observable unit of work.
            completedPages += pageBatch.length;
            updateProgress(completedPages, previewPages.length, startedAt);
          }

          updateProgress(previewPages.length, previewPages.length, startedAt);
          log("layout detection complete", {
            elapsedMs: Math.round(performance.now() - startedAt),
            pages: results,
          });
        } catch (error) {
          analyzerStatus.textContent = "error";
          log("layout detection failed", {
            message: error?.message ?? String(error),
            stack: error?.stack ?? null,
          });
        } finally {
          setBusy(false);
        }
      });
    </script>
  </body>
</html>
